<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#8e52fc">
<title>PetCare — Admin Login</title>
<link rel="stylesheet" href="shared.css">
<style>
.app { justify-content:center; align-items:center; min-height:100vh; background:var(--bg); }
.login-container {
  width:100%; max-width:400px; padding:20px;
  animation:fadeUp .6s ease both;
}
.brand-section { text-align:center; margin-bottom:32px; }
.dog-logo { width:80px; height:80px; margin-bottom:12px; animation:float 3s ease-in-out infinite; }
.brand-name { font-family:'Nunito',sans-serif; font-size:32px; font-weight:900; color:var(--pr); letter-spacing:-0.5px; }
.brand-sub { font-size:12px; font-weight:700; color:var(--muted); letter-spacing:3px; text-transform:uppercase; margin-top:-4px; }

.form-card {
  background:#fff; border-radius:24px;
  padding:32px;
  box-shadow:0 10px 40px rgba(142, 82, 252, 0.08);
  border:1.5px solid var(--border);
}
.form-title { font-size:24px; font-weight:800; color:var(--ink); margin-bottom:8px; text-align:center; }
.form-desc { font-size:14px; color:var(--muted); margin-bottom:28px; text-align:center; }

.input-group label { color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; }
.input-wrap input:focus { border-color:var(--pr); box-shadow:0 0 0 4px var(--pr-pale); }

.btn-primary { margin-top:12px; }

/* PROFILE SELECTION */
.profile-selection { display:flex; gap:10px; margin-bottom:24px; justify-content:center; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
.profile-selection::-webkit-scrollbar { display:none; }
.profile-card { flex:1; min-width:80px; padding:12px 6px; border:1.5px solid var(--border); border-radius:18px; text-align:center; cursor:pointer; transition:all .2s; background:var(--white); }
.profile-card:hover { border-color:var(--pr-pale); background:var(--bg); }
.profile-card.active { border-color:var(--pr); background:var(--pr-pale); box-shadow:0 0 0 4px var(--pr-pale); }
.profile-ava { width:42px; height:42px; border-radius:12px; background:var(--pr); color:#fff; display:flex; align-items:center; justify-content:center; font-size:18px; margin:0 auto 8px; font-weight:800; font-family:'Nunito',sans-serif; }
.profile-name { font-size:10px; font-weight:700; color:var(--ink); white-space:nowrap; }

</style>
</head>
<body>
<div class="app">
  <div class="login-container">
    <div class="brand-section">
      <svg class="dog-logo" viewBox="0 0 90 90" fill="none">
        <circle cx="45" cy="44" r="28" fill="#8e52fc" fill-opacity="0.15"/>
        <path d="M45 15 C25 15 15 35 15 50 C15 65 30 75 45 75 C60 75 75 65 75 50 C75 35 65 15 45 15" fill="#8e52fc" fill-opacity="0.1"/>
        <circle cx="45" cy="43" r="21" fill="#8e52fc"/>
        <circle cx="37" cy="38" r="5" fill="#fff"/>
        <circle cx="53" cy="38" r="5" fill="#fff"/>
        <circle cx="37.5" cy="38" r="2.5" fill="#1a0a2d"/>
        <circle cx="53.5" cy="38" r="2.5" fill="#1a0a2d"/>
        <ellipse cx="45" cy="48" rx="4" ry="2.5" fill="#d463f2" fill-opacity="0.6"/>
        <path d="M40 54 Q45 58 50 54" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
      <div class="brand-name">PetCare</div>
      <div class="brand-sub">Admin Dashboard</div>
    </div>

    <div class="form-card">
      <div class="form-title">Login Admin</div>
      <div class="form-desc">Silakan masuk untuk mengelola klinik</div>

      <div style="font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; text-align:center;">Pilih Profil Login</div>
      <div class="profile-selection" id="p-select">
        <div class="profile-card active" onclick="selProfile(this, 'Admin')">
          <div class="profile-ava" style="background:var(--ink)">A</div>
          <div class="profile-name">Admin</div>
        </div>
        <div class="profile-card" onclick="selProfile(this, 'drh. Budi')">
          <div class="profile-ava">B</div>
          <div class="profile-name">drh. Budi</div>
        </div>
        <div class="profile-card" onclick="selProfile(this, 'drh. Siti')">
          <div class="profile-ava" style="background:var(--sc)">S</div>
          <div class="profile-name">drh. Siti</div>
        </div>
        <div class="profile-card" onclick="selProfile(this, 'drh. Andi')">
          <div class="profile-ava" style="background:#666">A</div>
          <div class="profile-name">drh. Andi</div>
        </div>
      </div>


      <div class="input-group">
        <label>Username / Email</label>
        <div class="input-wrap">
          <input type="text" placeholder="Masukkan username" id="wa-input">
          <span class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
        </div>
      </div>

      <div class="input-group">
        <label>Kata Sandi</label>
        <div class="input-wrap">
          <input type="password" placeholder="Masukkan kata sandi" id="pass-input">
          <span class="input-icon" onclick="togglePass('pass-input')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </span>
        </div>
      </div>

      <button class="btn-primary" onclick="doLogin()">
        Masuk Dashboard
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>

      <div style="text-align:center;margin-top:20px;font-size:13px;color:var(--muted);">
        Bukan Staf Klinik? <a href="login-user.html" style="color:var(--pr);font-weight:700;text-decoration:none;">Masuk sebagai Pemilik</a>
      </div>
    </div>
  </div>
</div>
<script>
function togglePass(id){
  const i=document.getElementById(id);
  i.type=i.type==='password'?'text':'password';
}
let activeProfile = 'Admin';

function selProfile(el, name){
  document.querySelectorAll('.profile-card').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  activeProfile = name;
  
  // Auto-fill username for convenience in this mockup
  const wa = document.getElementById('wa-input');
  if(name === 'Admin') wa.value = 'admin';
  else if(name === 'drh. Budi') wa.value = 'drh_budi';
  else if(name === 'drh. Siti') wa.value = 'drh_siti';
  else if(name === 'drh. Andi') wa.value = 'drh_andi';
}

function doLogin(){
  const user = document.getElementById('wa-input').value.trim();
  const pass = document.getElementById('pass-input').value;

  // Profiles mapping for persistence
  const profiles = {
    'Admin': { name: 'drh. Andi Pratama', role: 'Admin Utama' },
    'drh. Budi': { name: 'drh. Budi', role: 'Dokter Klinik' },
    'drh. Siti': { name: 'drh. Siti', role: 'Dokter Klinik' },
    'drh. Andi': { name: 'drh. Andi Pratama', role: 'Admin Utama' }
  };

  if (pass === 'admin123') {
    // Save to localStorage
    const selected = profiles[activeProfile] || profiles['Admin'];
    localStorage.setItem('petcare_user', JSON.stringify(selected));
    
    alert('Selamat datang, ' + selected.name + '!');
    window.location.href = 'beranda-admin.html';
  } else {
    alert('Kata sandi salah!');
  }
}
</script>
</body>
</html>
