<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#d463f2">
<title>PetCare — Masuk Pemilik</title>
<link rel="stylesheet" href="shared.css">
<style>
.app { justify-content:center; align-items:center; min-height:100vh; background:var(--bg); }
.container { width:100%; max-width:400px; padding:24px; animation:fadeUp .6s ease both; }
.brand { text-align:center; margin-bottom:32px; }
.logo-box { width:64px; height:64px; background:linear-gradient(135deg,var(--sc),var(--pr)); border-radius:20px; display:flex; align-items:center; justify-content:center; margin:0 auto 12px; color:#fff; }

.form-card { background:#fff; border-radius:24px; padding:32px; border:1.5px solid var(--border); box-shadow:0 10px 40px rgba(212,99,242,0.06); }
.title { font-size:22px; font-weight:800; color:var(--ink); margin-bottom:8px; text-align:center; }
.desc { font-size:14px; color:var(--muted); text-align:center; margin-bottom:28px; }

.btn-primary { background:linear-gradient(135deg, var(--sc), var(--pr)); margin-top:12px; }
.register-link { text-align:center; margin-top:20px; font-size:13px; color:var(--muted); }
.register-link a { color:var(--sc); font-weight:700; text-decoration:none; }
</style>
</head>
<body>
<div class="app">
  <div class="container">
    <div class="brand">
      <div class="logo-box">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div style="font-family:'Nunito',sans-serif;font-size:24px;font-weight:900;color:var(--sc);">PetCare</div>
      <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;">Owner Portal</div>
    </div>

    <div class="form-card">
      <div class="title">Masuk ke Akun</div>
      <div class="desc">Akses riwayat kesehatan hewan Anda</div>

      <div class="input-group">
        <label>Nomor WhatsApp</label>
        <div class="input-wrap">
          <input type="tel" placeholder="081234567890" id="wa">
          <span class="input-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 3.24 9.77a19.79 19.79 0 0 1-3.07-8.67A2 2 0 012.18 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L6.91 9.14a16 16 0 006.95 6.95l1.41-1.41a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span>
        </div>
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" placeholder="Masukkan password" id="pass">
          <span class="input-icon" onclick="togglePass('pass')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
        </div>
      </div>

      <button class="btn-primary" onclick="login()">
        Masuk
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>

      <div class="register-link">
        Belum aktivasi? <a href="aktivasi.html">Klik di sini</a>
      </div>

      <div style="text-align:center;border-top:1px solid var(--border);margin-top:20px;padding-top:20px;font-size:12px;color:var(--muted);">
        Staf Klinik? <a href="login.html" style="color:var(--sc);font-weight:700;text-decoration:none;">Masuk Dashboard</a>
      </div>
    </div>
  </div>
</div>
<script>
function togglePass(id){
  const i=document.getElementById(id);
  i.type=i.type==='password'?'text':'password';
}
function login(){
  const wa = document.getElementById('wa').value;
  const pass = document.getElementById('pass').value;
  if(wa === '081234567890' && pass === '123456') {
    window.location.href = 'beranda.html';
  } else {
    alert('Nomor WA atau password belum terdaftar atau salah!');
  }
}
</script>
</body>
</html>
