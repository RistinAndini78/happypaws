<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f9f6ff">
<title>Ganti Password — PetCare</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="shared.js" defer></script>
<style>
:root{--pr:#8e52fc;--sc:#d463f2;--pr-pale:#f4eeff;--ink:#0f0a1a;--muted:#6b5a8a;--border:#e8d9ff;--bg:#f9f6ff;--white:#fff;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--ink);}
.app{max-width:500px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--white);}
.header{padding:50px 20px 20px;display:flex;align-items:center;gap:16px;border-bottom:1.5px solid var(--border);position:sticky;top:0;background:var(--white);z-index:100;}
.back-btn{width:40px;height:40px;border-radius:12px;background:var(--pr-pale);display:flex;align-items:center;justify-content:center;color:var(--pr);text-decoration:none;}
.header-title{font-size:18px;font-weight:800;}

.content{padding:24px 20px;}
.field{margin-bottom:20px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.field input{width:100%;padding:14px;border:1.5px solid var(--border);border-radius:14px;font-size:14px;font-family:inherit;background:var(--bg);outline:none;transition:all .2s;}
.field input:focus{border-color:var(--pr);background:var(--white);box-shadow:0 0 0 4px var(--pr-pale);}

.pass-hint{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5;}

.btn-save{width:100%;padding:16px;border-radius:16px;background:linear-gradient(135deg,var(--pr),var(--sc));color:#fff;font-size:15px;font-weight:800;border:none;cursor:pointer;margin-top:20px;box-shadow:0 8px 20px rgba(142,82,252,0.25);font-family:inherit;}
.btn-save:active{transform:scale(0.98);}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <a href="profil-user.html" class="back-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a>
    <div class="header-title">Ganti Password</div>
  </header>

  <div class="content">
    <div style="margin-bottom:32px; text-align:center;">
       <div style="width:64px; height:64px; border-radius:20px; background:var(--pr-pale); color:var(--pr); display:flex; align-items:center; justify-content:center; margin:0 auto 16px;">
         <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
       </div>
       <p style="font-size:14px; color:var(--muted);">Gunakan kombinasi yang kuat untuk menjaga keamanan akun Anda.</p>
    </div>

    <div class="field">
      <label>Password Lama</label>
      <input type="password" placeholder="••••••••">
    </div>

    <div class="field">
      <label>Password Baru</label>
      <input type="password" placeholder="••••••••">
      <p class="pass-hint">Minimal 8 karakter, kombinasi huruf dan angka.</p>
    </div>

    <div class="field">
      <label>Konfirmasi Password Baru</label>
      <input type="password" placeholder="••••••••">
    </div>

    <button class="btn-save" onclick="HappyPaws.showToast('Password berhasil diubah!', 'success'); setTimeout(()=>location.href='profil-user.html', 1500)">
      Simpan Password Baru
    </button>
  </div>
</div>
</body>
</html>
