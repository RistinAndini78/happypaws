<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#8e52fc">
<title>PetCare — Daftar</title>
<link rel="stylesheet" href="shared.css">
<style>
.top-area{background:var(--pr);padding:calc(env(safe-area-inset-top,0px) + 20px) 0 60px;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden;}
.blob-tl{width:100px;height:100px;top:-20px;left:-20px;background:rgba(255,255,255,.2);}
.blob-tr{width:80px;height:80px;top:-10px;right:-10px;background:rgba(255,255,255,.15);}
.dog-logo{width:80px;height:80px;animation:float 3s ease-in-out infinite;}
.brand-name{font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;color:#fff;margin-top:8px;}
.brand-sub{font-size:11px;font-weight:600;color:rgba(255,255,255,.65);letter-spacing:2px;text-transform:uppercase;}
.form-card{background:#fff;border-radius:32px 32px 0 0;margin-top:-24px;padding:28px 24px 40px;width:100%;box-sizing:border-box;flex:1;box-shadow:0 -4px 32px rgba(0,0,0,.08);animation:fadeUp .4s ease;}
.form-title{font-size:22px;font-weight:800;color:var(--text);}
.form-subtitle{font-size:22px;font-weight:800;color:var(--pr);}
.form-footer{text-align:center;margin-top:16px;font-size:13px;color:var(--muted);}
.form-footer a{color:var(--pr);font-weight:700;text-decoration:none;}
.info-box{background:var(--pr-pale);border-radius:12px;padding:12px;border:1.5px solid var(--border);margin-bottom:18px;font-size:12.5px;color:var(--text);line-height:1.6;}
</style>
</head>
<body>
<div class="app">
  <div class="top-area">
    <div class="blob blob-tl"></div>
    <div class="blob blob-tr"></div>
    <svg class="dog-logo" viewBox="0 0 80 80" fill="none">
      <circle cx="40" cy="39" r="25" fill="#d4a574"/>
      <ellipse cx="25" cy="22" rx="10" ry="13" fill="#c4956a" transform="rotate(-15 25 22)"/>
      <ellipse cx="55" cy="22" rx="10" ry="13" fill="#c4956a" transform="rotate(15 55 22)"/>
      <circle cx="40" cy="38" r="19" fill="#e8c49a"/>
      <circle cx="33" cy="33" r="4.5" fill="#fff"/><circle cx="47" cy="33" r="4.5" fill="#fff"/>
      <circle cx="33.5" cy="33" r="2.5" fill="#2d1200"/><circle cx="47.5" cy="33" r="2.5" fill="#2d1200"/>
      <circle cx="35" cy="32" r="1" fill="#fff"/><circle cx="49" cy="32" r="1" fill="#fff"/>
      <ellipse cx="40" cy="43" rx="4.5" ry="2.8" fill="#c4956a"/>
      <path d="M35 48 Q40 54 45 48" stroke="#c4956a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <ellipse cx="40" cy="50" rx="3.5" ry="3" fill="#e74c3c"/>
      <rect x="15" y="53" width="16" height="12" rx="8" fill="#d4a574"/>
      <rect x="49" y="53" width="16" height="12" rx="8" fill="#d4a574"/>
    </svg>
    <div class="brand-name">PetCare</div>
    <div class="brand-sub">Smart System</div>
  </div>
  <div class="form-card">
    <div class="form-title">Selamat Datang!</div>
    <div class="form-subtitle">Daftar Admin</div>
    <br>
    <div class="info-box">ℹ️ Halaman ini untuk <strong>admin/dokter klinik</strong>. Akun pemilik hewan dibuat otomatis oleh admin saat mendaftarkan pasien.</div>
    <div class="input-group"><label>Nama Lengkap</label><div class="input-wrap"><input type="text" placeholder="Nama lengkap Anda"></div></div>
    <div class="input-group"><label>Nama Klinik</label><div class="input-wrap"><input type="text" placeholder="Nama klinik hewan"></div></div>
    <div class="input-group"><label>Nomor WhatsApp</label><div class="input-wrap"><input type="tel" placeholder="08xxxxxxxxxx"></div></div>
    <div class="input-group"><label>Kata Sandi</label><div class="input-wrap"><input type="password" placeholder="Min. 8 karakter" id="p1"><span class="input-icon" onclick="document.getElementById('p1').type=document.getElementById('p1').type==='password'?'text':'password'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span></div></div>
    <div class="input-group"><label>Konfirmasi Kata Sandi</label><div class="input-wrap"><input type="password" placeholder="Ulangi kata sandi" id="p2"><span class="input-icon" onclick="document.getElementById('p2').type=document.getElementById('p2').type==='password'?'text':'password'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span></div></div>
    <button class="btn-primary" onclick="window.location.href='beranda-admin.html'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
      Daftarkan Klinik
    </button>
    <div class="form-footer">Sudah punya akun? <a href="login.html">Masuk di sini</a></div>
  </div>
</div>
</body>
</html>
