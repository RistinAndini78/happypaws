<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#1a0f00">
<title>PetCare — Tambah Pasien Baru</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900&display=swap');
:root{
  --pr: #8e52fc; --sc: #d463f2; --pr-pale: #f4eeff; --sc-pale: #fbeeff; --pr-bg: #8e52fc;
  --ink: #0f0a1a; --text: #1a0a2d; --muted: #6b5a8a; --border: #e8d9ff; --bg: #f9f6ff; --white: #fff;
  --red: #ff4757; --red-p: #fff1f2; --green: #2ed573; --green-p: #f0fff4;
  --blue: #1e90ff; --blue-p: #f0f8ff; --yellow: #ffa502; --yellow-p: #fff9e6;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100%;background:var(--bg);}
.admin-body{display:flex;min-height:100vh;}

/* SIDEBAR - MASTER SYNC */
.sidebar{width:260px;height:100vh;background:var(--ink);position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:100;}
.sb-logo{padding:20px 18px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px;}
.sb-logo-box{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--sc),var(--pr));display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
.sb-logo-name{font-weight:700;font-size:14px;color:#fff;}
.sb-logo-sub{font-size:9px;color:var(--sc);text-transform:uppercase;letter-spacing:.6px;font-weight:600;}
.sb-nav{flex:1;padding:8px 10px;overflow-y:auto;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:rgba(255,255,255,.62);text-decoration:none;font-size:13px;font-weight:500;margin-bottom:2px;border:1px solid transparent;transition:all .18s;cursor:pointer;}
.ni:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9);}
.ni.active{background:rgba(142,82,252,0.15);color:var(--pr-pale);border-color:rgba(142,82,252,0.2);font-weight:600;}
.ni svg{flex-shrink:0;width:17px;height:17px;}
.sb-user{padding:14px 16px;border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px;}
.sb-ava{width:34px;height:34px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;color:var(--pr);flex-shrink:0;}
.sb-uname{font-size:12px;font-weight:600;color:#fff;}
.sb-urole{font-size:10px;color:var(--sc);}

/* CONTENT MASTER */
.main-admin{margin-left:260px;flex:1;display:flex;flex-direction:column;}
.topbar{height:64px;background:var(--white);border-bottom:1.5px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.content{padding:24px 28px;max-width:900px;}

.card{background:var(--white);border-radius:16px;border:1.5px solid var(--border);overflow:hidden;margin-bottom:20px;}
.card-head{padding:16px 20px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:10px;}
.card-title{font-weight:800;font-size:15px;color:var(--ink);}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:24px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:700;margin-bottom:6px;color:var(--muted);}
.field input, .field select, .field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;background:var(--bg);outline:none;transition:all .2s;}
.field input:focus{border-color:var(--pr);background:var(--white);}

.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s;text-decoration:none;}
.btn-primary{background:var(--pr);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--muted);}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .3s;}
  .sidebar.open{transform:translateX(0);}
  .main-admin{margin-left:0;}
  .form-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="admin-body">
  <aside class="sidebar" id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-box"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M4.5 16.5c-1.5 1.26-2 3.33-1 4.5s3.24.5 4.5-1M19.5 16.5c1.5 1.26 2 3.33 1 4.5s-3.24.5-4.5-1M12 18c-2.5 0-4.5 2-4.5 4.5S9.5 27 12 27s4.5-2 4.5-4.5S14.5 18 12 18z"/><circle cx="7" cy="7" r="3"/><circle cx="17" cy="7" r="3"/><circle cx="12" cy="11" r="3"/></svg></div>
      <div><div class="sb-logo-name">PetCare</div><div class="sb-logo-sub">SMART CLINIC</div></div>
    </div>
    <div class="sb-nav">
      <a href="beranda-admin.html" class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg> Beranda</a>
      <a href="manajemen-pasien.html" class="ni active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Manajemen Pasien</a>
      <a href="rekam-medis-admin.html" class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Riwayat Medis</a>
      <a href="data-pemilik.html" class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg> Data Pemilik</a>
      <a href="stok-vaksin-admin.html" class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5 20.5l10-10a4.95 4.95 0 0 0 0-7 4.95 4.95 0 0 0-7 0l-10 10a4.95 4.95 0 0 0 0 7 4.95 4.95 0 0 0 7 0z"/><line x1="8.5" y1="8.5" x2="15.5" y2="15.5"/></svg> Stok Vaksin</a>
      <a href="reminder-ai.html" class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg> Reminder AI</a>
      <a href="pengaturan-admin.html" class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Pengaturan</a>
    </div>
    <div class="sb-user">
      <div style="display:flex; align-items:center; gap:10px;">
        <div class="sb-ava"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        <div><div class="sb-uname" id="side-name">drh. Budi</div><div class="sb-urole" id="side-role">Dokter Klinik</div></div>
      </div>
      <a href="index.html" style="color:var(--red); margin-left:auto;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></a>
    </div>
  </aside>

  <main class="main-admin">
    <header class="topbar">
      <div style="display:flex; align-items:center; gap:16px;">
        <a href="manajemen-pasien.html" class="btn btn-outline btn-sm" style="padding:8px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Kembali</a>
        <div><h1 style="font-size:17px; font-weight:700;">Tambah Pasien Baru</h1><p style="font-size:11.5px; color:var(--muted);">Daftarkan hewan peliharaan ke sistem</p></div>
      </div>
      <div class="sb-ava" style="cursor:pointer;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
    </header>

    <div class="content">
      <div class="card">
        <div class="card-head"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--pr)" stroke-width="2.5"><path d="M12 5C7.58 5 4 8.13 4 12c0 3.87 3.58 7 8 7s8-3.13 8-7c0-3.87-3.58-7-8-7z"/><circle cx="9" cy="10" r="1" fill="currentColor"/><circle cx="15" cy="10" r="1" fill="currentColor"/></svg><h3 class="card-title">Informasi Hewan</h3></div>
        <div class="form-grid">
          <div class="field"><label>Nama Hewan</label><input type="text" placeholder="Masukkan nama hewan"></div>
          <div class="field"><label>Jenis Hewan</label>
            <select>
              <option value="">Pilih Jenis</option>
              <option>Kucing</option>
              <option>Anjing</option>
              <option>Burung</option>
              <option>Lainnya</option>
            </select>
          </div>
          <div class="field"><label>Ras / Breed</label><input type="text" placeholder="Contoh: Persia / Golden Retriever"></div>
          <div class="field"><label>Tanggal Lahir / Umur</label><input type="date"></div>
          <div class="field"><label>Jenis Kelamin</label>
            <select>
              <option>Jantan</option>
              <option>Betina</option>
            </select>
          </div>
          <div class="field"><label>Warna / Ciri Khas</label><input type="text" placeholder="Contoh: Putih belang coklat"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--pr)" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><h3 class="card-title">Informasi Pemilik</h3></div>
        <div class="form-grid">
          <div class="field"><label>Cari Pemilik Terdaftar</label><input type="text" placeholder="Ketik nama atau No. HP pemilik"></div>
          <div style="display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:12px;">Atau daftar pemilik baru</div>
          <div class="field"><label>Nama Pemilik Baru</label><input type="text" placeholder="Nama lengkap pemilik"></div>
          <div class="field"><label>No. HP / WhatsApp</label><input type="tel" placeholder="08xxxxxxxxxx"></div>
          <div class="field" style="grid-column:1/-1;"><label>Alamat</label><textarea placeholder="Alamat lengkap pemilik" rows="2" style="width:100%; padding:10px; border:1.5px solid var(--border); border-radius:10px; font-size:13px; background:var(--bg); outline:none; font-family:inherit;"></textarea></div>
        </div>
      </div>

      <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:10px;">
        <a href="manajemen-pasien.html" class="btn btn-outline">Batal</a>
        <button class="btn btn-primary" onclick="HappyPaws.showToast('Pasien berhasil ditambahkan!', 'success'); setTimeout(()=>location.href='manajemen-pasien.html', 1500)">Simpan Pasien Baru</button>
      </div>
    </div>
  </main>
</div>

<script src="shared.js"></script>
</body>
</html>
