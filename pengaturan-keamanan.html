<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>PetCare — Keamanan</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
:root{--pr:#8e52fc;--sc:#d463f2;--pr-pale:#f4eeff;--ink:#0f0a1a;--muted:#6b5a8a;--border:#e8d9ff;--bg:#f9f6ff;--white:#fff;}
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:var(--bg);}
.admin-body{display:flex;min-height:100vh;}
.sidebar{width:260px;height:100vh;background:var(--ink);position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:100;}
.sb-logo{padding:20px 18px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px;}
.sb-logo-box{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--sc),var(--pr));display:flex;align-items:center;justify-content:center;color:#fff;}
.sb-logo-name{font-weight:700;font-size:14px;color:#fff;}
.sb-nav{flex:1;padding:8px 10px;overflow-y:auto;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:rgba(255,255,255,.62);text-decoration:none;font-size:13px;font-weight:500;margin-bottom:2px;border:1px solid transparent;transition:all .18s;}
.ni.active{background:rgba(142,82,252,0.15);color:var(--pr-pale);border-color:rgba(142,82,252,0.2);font-weight:600;}

.main-admin{margin-left:260px;flex:1;display:flex;flex-direction:column;}
.topbar{height:64px;background:var(--white);border-bottom:1.5px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.content{padding:24px 28px;}

.settings-grid{display:grid;grid-template-columns:240px 1fr;gap:20px;}
.side-menu-card{background:var(--white);border-radius:16px;border:1.5px solid var(--border);padding:8px;position:sticky;top:84px;}
.sm-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;cursor:pointer;color:var(--muted);font-weight:700;font-size:13px;transition:all .2s;margin-bottom:4px;border:1.5px solid transparent;text-decoration:none;}
.sm-item:hover, .sm-item.active{background:var(--pr-pale);color:var(--pr) !important;}

.card{background:var(--white);border-radius:16px;border:1.5px solid var(--border);overflow:hidden;}
.card-head{padding:16px 20px;border-bottom:1.5px solid var(--border);}
.card-title{font-weight:800;font-size:15px;}
.btn-primary{background:var(--pr);color:#fff;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;}
</style>
</head>
<body>
<div class="admin-body">
  <aside class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-box"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M4.5 16.5c-1.5 1.26-2 3.33-1 4.5s3.24.5 4.5-1M19.5 16.5c1.5 1.26 2 3.33 1 4.5s-3.24.5-4.5-1M12 18c-2.5 0-4.5 2-4.5 4.5S9.5 27 12 27s4.5-2 4.5-4.5S14.5 18 12 18z"/><circle cx="7" cy="7" r="3"/><circle cx="17" cy="7" r="3"/><circle cx="12" cy="11" r="3"/></svg></div>
      <div><div class="sb-logo-name">PetCare</div><div style="font-size:9px;color:var(--sc);font-weight:600;">SMART CLINIC</div></div>
    </div>
    <div class="sb-nav">
      <a href="beranda-admin.html" class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z"/></svg> Beranda</a>
      <a href="manajemen-pasien.html" class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17"><path d="M17 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Manajemen Pasien</a>
      <a href="rekam-medis-admin.html" class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Riwayat Medis</a>
      <a href="data-pemilik.html" class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17"><path d="M17 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg> Data Pemilik</a>
      <a href="stok-vaksin-admin.html" class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17"><path d="M10.5 20.5l10-10a4.95 4.95 0 0 0 0-7 4.95 4.95 0 0 0-7 0l-10 10a4.95 4.95 0 0 0 0 7 4.95 4.95 0 0 0 7 0z"/><line x1="8.5" y1="8.5" x2="15.5" y2="15.5"/></svg> Stok Vaksin</a>
      <a href="reminder-ai.html" class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg> Reminder AI</a>
      <a href="pengaturan-admin.html" class="ni active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1-2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Pengaturan</a>
    </div>
  </aside>

  <main class="main-admin">
    <header class="topbar">
      <div><h1 style="font-size:17px; font-weight:700;">Keamanan</h1><p style="font-size:11px; color:var(--muted);">Kelola keamanan akun dan data</p></div>
    </header>

    <div class="content">
      <div class="settings-grid">
        <div class="side-menu-card">
          <a href="pengaturan-admin.html" class="sm-item">Profil Klinik</a>
          <a href="pengaturan-operasional.html" class="sm-item">Jam Operasional</a>
          <a href="pengaturan-staf.html" class="sm-item">Manajemen Staf</a>
          <a href="pengaturan-notifikasi.html" class="sm-item">Notifikasi</a>
          <a href="pengaturan-integrasi.html" class="sm-item">Integrasi</a>
          <a href="pengaturan-akun.html" class="sm-item">Akun Saya</a>
          <a href="pengaturan-keamanan.html" class="sm-item active">Keamanan</a>
        </div>
        <div class="card">
          <div class="card-head"><h3 class="card-title">Ganti Password</h3></div>
          <div style="padding:24px;">
            <button class="btn-primary" onclick="location.href='ganti-password-admin.html'">Ubah Password Sekarang</button>
            <p style="font-size:11px; color:var(--muted); margin-top:12px;">Terakhir diubah: 3 bulan yang lalu</p>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="shared.js"></script>
</body>
</html>
